<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Koordinator - IT Stock Opname</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script> tailwind.config = { darkMode: 'class' } </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-[#0b1329] dark:text-slate-100 min-h-screen pb-10">

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-100 dark:bg-[#0b1329] z-[999] loading-overlay">
        <div class="flex flex-col items-center justify-center transition-all duration-300">
            <div class="loader border-t-cyan-500 dark:border-t-cyan-400 w-14 h-14 border-4 rounded-full slow-spin"></div> 
            <p id="loadingStatus" class="text-cyan-600 dark:text-cyan-400 font-black tracking-widest uppercase mt-4 text-[10px] animate-pulse">Menyusun Laporan...</p>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-slate-800 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center max-w-6xl">
            <div>
                <p class="text-[9px] font-black opacity-60 uppercase tracking-widest leading-none">Command Center</p>
                <h1 class="font-black text-sm tracking-tight uppercase mt-0.5">Monitoring Koordinator</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="namaUser" class="text-[10px] font-mono font-black bg-white/10 dark:bg-slate-800 border border-white/10 px-3 py-2 rounded-xl uppercase tracking-widest text-white">MEMUAT...</span>
                <button onclick="toggleTheme()" id="themeBtn" class="bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-2 rounded-xl transition-all active:scale-95 text-[10px] font-black tracking-widest uppercase font-mono text-white">DARK MODE</button>
                <button onclick="showLogoutModal()" class="bg-rose-500 hover:bg-rose-600 p-2.5 rounded-xl transition shadow-lg active:scale-90 text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="p-4 md:p-6 container mx-auto max-w-6xl">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white dark:bg-[#132247]/40 p-5 rounded-[2rem] border border-slate-200/60 dark:border-slate-800/60 shadow-sm backdrop-blur-sm"><p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Total Halte</p><h2 id="totalHalte" class="text-2xl font-black text-slate-800 dark:text-white leading-none">0</h2></div>
            <div class="bg-white dark:bg-[#132247]/40 p-5 rounded-[2rem] border border-slate-200/60 dark:border-slate-800/60 shadow-sm backdrop-blur-sm"><p class="text-[9px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-wider mb-1.5">Selesai Diperiksa</p><h2 id="halteSelesai" class="text-2xl font-black text-emerald-600 dark:text-emerald-400 leading-none">0</h2></div>
            <div class="bg-white dark:bg-[#132247]/40 p-5 rounded-[2rem] border border-slate-200/60 dark:border-slate-800/60 shadow-sm backdrop-blur-sm"><p class="text-[9px] font-black text-[#0095DA] uppercase tracking-wider mb-1.5">Total Progress</p><h2 id="progressVisit" class="text-2xl font-black text-[#0095DA] leading-none">0%</h2></div>
            <div class="bg-white dark:bg-[#132247]/40 p-5 rounded-[2rem] border border-slate-200/60 dark:border-slate-800/60 shadow-sm backdrop-blur-sm"><p class="text-[9px] font-black text-amber-500 uppercase tracking-wider mb-1.5">Total Alat Terdata</p><h2 id="totalPerangkat" class="text-2xl font-black text-amber-500 leading-none">0</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section>
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Performance Engineer</h2>
                    <span class="text-[9px] font-bold bg-blue-50 text-[#0095DA] dark:bg-blue-950/30 px-2.5 py-1 rounded-md uppercase tracking-wider">Monitoring Lapangan</span>
                </div>
                <div id="engineerList" class="space-y-4"></div>
            </section>
            <section>
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Progress Wilayah Kerja</h2>
                    <span class="text-[9px] font-bold bg-slate-200/60 text-slate-600 dark:bg-slate-800 dark:text-slate-400 px-2.5 py-1 rounded-md uppercase tracking-wider">Status Koridor</span>
                </div>
                <div class="mb-4 sticky top-[76px] z-40 bg-slate-100/80 dark:bg-[#0b1329]/70 backdrop-blur-md py-1">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-xs opacity-50">🔍</div>
                        <input type="text" id="searchKoridor" oninput="filterKoridorManual()" placeholder="Cari Nomor Koridor Tugas..." class="w-full p-4 pl-12 bg-white dark:bg-[#132247]/50 border border-slate-200/80 dark:border-slate-800/80 rounded-2xl text-xs font-bold text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-[#0095DA] focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-950/50 shadow-sm transition-all uppercase tracking-wide">
                    </div>
                </div>
                <div id="koridorList" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <div id="logoutModal" class="hidden fixed inset-0 z-[9999] bg-slate-900/60 dark:bg-[#050b14]/80 backdrop-blur-sm flex items-center justify-center p-4 transition-all opacity-0">
        <div id="logoutModalContent" class="bg-white dark:bg-[#132247] rounded-[2rem] p-6 w-full max-w-xs border border-slate-200 dark:border-slate-800 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="w-16 h-16 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner border border-rose-200 dark:border-rose-800/50">👋</div>
            <h3 class="text-center font-black text-slate-800 dark:text-white text-lg mb-1 uppercase tracking-tight">Akhiri Sesi?</h3>
            <p class="text-center text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-6 tracking-widest uppercase">Anda akan keluar dari aplikasi.</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeLogoutModal()" class="py-3 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-[#0f1a36] dark:hover:bg-[#1a294d] text-slate-600 dark:text-slate-300 font-black text-[10px] tracking-widest uppercase transition-colors active:scale-95 border border-slate-200 dark:border-slate-700">Batal</button>
                <button onclick="executeLogout()" class="py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-black text-[10px] tracking-widest uppercase shadow-lg shadow-rose-500/20 transition-all active:scale-95">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');
        if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); if (themeBtn) themeBtn.innerText = 'LIGHT MODE'; } else { document.documentElement.classList.remove('dark'); if (themeBtn) themeBtn.innerText = 'DARK MODE'; }
        function toggleTheme() { if (document.documentElement.classList.contains('dark')) { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); if (themeBtn) themeBtn.innerText = 'DARK MODE'; } else { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); if (themeBtn) themeBtn.innerText = 'LIGHT MODE'; } }
    </script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/koordinator.js"></script>
</body>
</html>
