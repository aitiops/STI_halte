<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Stock Opname - IT Stock Opname</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        // MENGAKTIFKAN ENGINE CLASS-BASED DARK MODE TAILWIND
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* FORCE OVERRIDE DATA FORM SAAT MODE GELAP (DARK MODE) */
        .dark .bg-white { background-color: #132247 !important; border-color: rgba(30, 41, 59, 0.8) !important; box-shadow: none !important; }
        .dark .text-slate-700, .dark p.font-bold { color: #ffffff !important; }
        .dark .border-slate-100, .dark .border-dashed { border-color: rgba(51, 65, 85, 0.6) !important; }
        .dark .bg-slate-50\/50 { background-color: rgba(15, 23, 42, 0.3) !important; }
        
        /* Kustomisasi Input Form Khusus Mode Gelap */
        .dark .tj-input { 
            background-color: #1e293b !important; 
            border-color: #334155 !important; 
            color: #f1f5f9 !important; 
        }
        .dark .tj-input:focus { border-color: #0095DA !important; }
        
        /* ANTI-GHAIB DROPDOWN FIX: Serahkan hak highlight warna ke OS browser mobile */
        .dark select.tj-input option { 
            background-color: #1e293b; 
            color: #ffffff; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-[#0b1329] dark:text-slate-100 min-h-screen pb-10">

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-100 dark:bg-[#0b1329] z-[999] loading-overlay">
        <div class="flex flex-col items-center justify-center transition-all duration-300">
            <div class="loader border-t-cyan-500 dark:border-t-cyan-400 w-14 h-14 border-4 rounded-full slow-spin"></div> 
            <p id="loadingStatus" class="text-cyan-600 dark:text-cyan-400 font-black tracking-widest uppercase mt-4 text-[10px] animate-pulse">Menyiapkan Formulir...</p>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-slate-950/60 hidden items-center justify-center z-[9999] p-4 backdrop-blur-sm transition-all duration-300">
        <div class="bg-white dark:bg-[#132247] w-full max-w-sm rounded-[2.5rem] p-6 shadow-2xl border border-slate-200/60 dark:border-slate-800/60 text-center">
            <div class="w-14 h-14 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-500 dark:text-emerald-400 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 shadow-inner animate-bounce">
                ✓
            </div>
            <h3 class="text-slate-800 dark:text-white font-black text-sm uppercase tracking-wider mb-2">Sinkronisasi Berhasil</h3>
            <p class="text-slate-400 dark:text-slate-400 text-xs font-medium px-2 leading-relaxed">Data stock opname berhasil disimpan dan diperbarui ke dalam sistem.</p>
        </div>
    </div>

    <nav class="bg-slate-900 border-b border-slate-800 text-white p-4 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center max-w-2xl">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="hover:bg-white/20 p-2 rounded-xl transition-all active:scale-90 text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <p class="text-[9px] font-black opacity-60 uppercase tracking-widest leading-none">Formulir</p>
                    <h1 id="pageTitle" class="font-black text-sm tracking-tight uppercase mt-0.5">Input Opname</h1>
                </div>
            </div>
            <button onclick="toggleTheme()" id="themeBtn" class="bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-2 rounded-xl transition-all active:scale-95 text-[10px] font-black tracking-widest uppercase font-mono text-white">
                DARK MODE
            </button>
        </div>
    </nav>

    <main class="p-4 md:p-8 container mx-auto max-w-2xl">
        
        <div class="bg-gradient-to-br from-blue-50/80 via-slate-50 to-white dark:from-[#132247] dark:via-[#111c3a] dark:to-[#0f172e] p-6 rounded-[2rem] shadow-md shadow-slate-200/60 dark:shadow-2xl border border-blue-100/50 dark:border-slate-800/80 mb-6 relative overflow-hidden">
            <div class="grid grid-cols-2 gap-4 relative z-10">
                <div>
                    <p class="label-text mb-1 text-[#0095DA]">Koridor Kerja</p>
                    <p id="infoKoridor" class="font-black text-slate-800 dark:text-white uppercase tracking-wide text-sm">-</p>
                </div>
                <div>
                    <p class="label-text mb-1 text-[#0095DA]">Halte Tujuan</p>
                    <p id="infoHalte" class="font-black text-slate-800 dark:text-white uppercase tracking-wide text-sm">-</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-md shadow-slate-200/40 dark:shadow-xl border border-slate-200/60 dark:border-slate-800/60">
            <div class="space-y-6">
                <div>
                    <label class="label-text">Kategori Perangkat</label>
                    <select id="kategori" onchange="changeKategori()" class="tj-input">
                        <option value="">Pilih Kategori</option>
                    </select>
                </div>

                <div>
                    <label class="label-text">Nama Perangkat</label>
                    <select id="namaPerangkat" onchange="changePerangkat()" class="tj-input">
                        <option value="">Pilih Perangkat</option>
                    </select>
                </div>

                <div>
                    <label class="label-text">Merk / Model</label>
                    <select id="merkModel" class="tj-input">
                        <option value="">Pilih Merk / Model</option>
                    </select>
                </div>

                <div id="arahContainer" class="hidden">
                    <label class="label-text">Arah Perangkat</label>
                    <select id="arahPerangkat" class="tj-input">
                        <option value="">Pilih Arah</option>
                    </select>
                </div>

                <div>
                    <label class="label-text">Serial Number (S/N)</label>
                    <input type="text" id="serialNumber" placeholder="Masukkan S/N Perangkat" class="tj-input">
                </div>

                <div>
                    <label class="label-text">Status Perangkat</label>
                    <select id="statusPerangkat" class="tj-input">
                        <option value="" selected disabled>-- Pilih Status Perangkat --</option>
                        <option value="On Service">On Service</option>
                        <option value="Out of Service">Out of Service</option>
                    </select>
                </div>

                <div class="pt-4 border-t border-slate-100 dark:border-slate-800/40">
                    <label class="label-text">Dokumentasi Foto</label>
                    <div class="mt-2 flex flex-col items-center p-8 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl hover:border-[#0095DA] dark:hover:border-[#0095DA] transition-all cursor-pointer bg-slate-50/50" onclick="document.getElementById('photo').click()">
                        <input type="file" id="photo" accept="image/*" capture="environment" onchange="previewImage(event)" class="hidden">
                        <div id="uploadPlaceholder" class="text-center">
                            <span class="text-3xl mb-2 block">📷</span>
                            <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Ambil Foto Perangkat</p>
                        </div>
                        <img id="previewPhoto" class="hidden w-full max-w-[200px] rounded-2xl shadow-xl">
                    </div>
                </div>

                <div class="pt-4">
                    <button id="btnSave" onclick="saveStockOpname()" class="w-full bg-[#0095DA] hover:bg-[#007bb5] text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-500/10 active:scale-95 transition-all">
                        Simpan Data
                    </button>
                    <p id="message" class="text-center mt-4 text-[10px] font-black uppercase tracking-widest min-h-[1rem]"></p>
                </div>
            </div>
        </div>
    </main>

    <div id="logoutModal" class="hidden fixed inset-0 z-[9999] bg-slate-900/60 dark:bg-[#050b14]/80 backdrop-blur-sm flex items-center justify-center p-4 transition-all opacity-0">
        <div id="logoutModalContent" class="bg-white dark:bg-[#132247] rounded-[2rem] p-6 w-full max-w-xs border border-slate-200 dark:border-slate-800 shadow-2xl transform scale-95 transition-all duration-300">
            <div class="w-16 h-16 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner border border-rose-200 dark:border-rose-800/50">👋</div>
            <h3 class="text-center font-black text-slate-800 dark:text-white text-lg mb-1 uppercase tracking-tight">Akhiri Sesi?</h3>
            <p class="text-center text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-6 tracking-widest uppercase">Anda akan keluar dari aplikasi.</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeLogoutModal()" class="py-3 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-[#0f1a36] dark:hover:bg-[#1a294d] text-slate-600 dark:text-slate-300 font-black text-[10px] tracking-widest uppercase transition-colors active:scale-95 border border-slate-200 dark:border-slate-700">Batal</button>
                <button onclick="executeLogout()" class="py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-black text-[10px] tracking-widest uppercase shadow-lg shadow-rose-500/20 transition-all active:scale-95">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const themeBtn = document.getElementById('themeBtn');

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            if (themeBtn) themeBtn.innerText = 'LIGHT MODE';
        } else {
            document.documentElement.classList.remove('dark');
            if (themeBtn) themeBtn.innerText = 'DARK MODE';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                if (themeBtn) themeBtn.innerText = 'DARK MODE';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                if (themeBtn) themeBtn.innerText = 'LIGHT MODE';
            }
        }
    </script>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/stock-opname.js"></script>
</body>
</html>
