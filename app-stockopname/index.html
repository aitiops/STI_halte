<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Command Center TJ</title>
    <link rel="stylesheet" href="css/styles.css">
    <script> tailwind.config = { darkMode: 'class' } </script>
</head>
<body class="tj-bg dark:bg-[#050b14] transition-colors duration-500 min-h-screen flex items-center justify-center selection:bg-cyan-500 selection:text-white">

    <div class="glass-card flex flex-col items-center dark:bg-[#0a1224]/80 dark:border-slate-800 transition-all">
        
        <div class="w-full flex flex-col items-center text-center mb-[1.5rem]">
            <img src="assets/logo_tj.png" alt="Logo TJ" style="height: 45px; margin-bottom: 0.5rem;" class="drop-shadow-lg">
            <h1 style="color: white; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">IT Stock Opname</h1>
        </div>

        <form onsubmit="event.preventDefault(); login();" class="w-full">
            <div style="margin-bottom: 1rem;">
                <label class="label-text dark:text-cyan-400">Username / NIK</label>
                <input type="text" id="username" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500 transition-all" placeholder="NIK Anda" required>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="label-text dark:text-cyan-400">Kata Sandi</label>
                <input type="password" id="password" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500 transition-all" placeholder="Password" required>
                <label class="checkbox-container select-none dark:text-slate-400 mt-2">
                    <input type="checkbox" id="showPass" onclick="togglePass('password')">
                    <span class="text-xs font-bold tracking-wide">Tampilkan Sandi</span>
                </label>
            </div>
            
            <button type="submit" class="tj-btn dark:bg-gradient-to-r dark:from-cyan-600 dark:to-blue-700 dark:border-none shadow-lg shadow-cyan-900/30 transition-all active:scale-95">Masuk System</button>
        </form>
        
        <p id="message" style="text-align: center; color: #fbbf24; font-size: 0.65rem; font-weight: 700; margin-top: 1rem;"></p>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md z-[999] opacity-0 invisible transition-all duration-500">
        <div class="flex flex-col items-center justify-center">
            <div class="loader border-t-cyan-400 w-14 h-14 border-4 rounded-full slow-spin"></div> 
            <p class="text-cyan-400 font-black tracking-widest uppercase mt-4 text-[10px] animate-pulse">Memverifikasi Akun...</p>
        </div>
    </div>

    <script>
        // Cek Tema (Agar kalau user pakai mode gelap, login-nya ikutan gelap otomatis)
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        function togglePass(id) {
            const x = document.getElementById(id);
            if (x) x.type = x.type === "password" ? "text" : "password";
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
