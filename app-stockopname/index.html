<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Command Center TJ</title>
    <link rel="stylesheet" href="css/styles.css">
    <script> tailwind.config = { darkMode: 'class' } </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Efek Glassmorphism Premium Card */
        .glass-login-card { 
            background: rgba(10, 18, 36, 0.75); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        /* Animasi Garis Peta */
        .anim-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 6s linear forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="tj-bg dark:bg-[#050b14] transition-colors duration-500 min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-cyan-500 selection:text-white">

    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
        <svg class="w-full h-full" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100 950 L 300 550 L 800 550 L 1000 250 L 1500 250" fill="none" stroke="#0095DA" stroke-width="2" class="anim-line" stroke-dasharray="8 4" />
            <path d="M-50 400 L 200 400 L 300 550 L 500 950" fill="none" stroke="#8B5CF6" stroke-width="2" class="anim-line" />
            <circle cx="300" cy="550" r="7" fill="#050b14" stroke="#fff" stroke-width="2" />
            <circle cx="800" cy="550" r="5" fill="#050b14" stroke="#0095DA" stroke-width="2" />
        </svg>
    </div>

    <div class="glass-login-card w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative z-10 flex flex-col items-center transition-all">
        
        <div class="w-full flex flex-col items-center text-center mb-[2rem]">
            <img src="assets/logo_tj.png" alt="Logo TJ" style="height: 42px; margin-bottom: 0.75rem;" class="drop-shadow-lg filter brightness-0 invert">
            <h1 class="text-white font-black text-xs uppercase tracking-[0.25em] text-shadow: 0 2px 10px rgba(0,0,0,0.5);">IT Stock Opname</h1>
            <div class="w-10 h-0.5 bg-cyan-500 mt-3 rounded-full"></div>
        </div>

        <form onsubmit="event.preventDefault(); login();" class="w-full">
            <div style="margin-bottom: 1.25rem;">
                <label class="block text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Username / NIK</label>
                <input type="text" id="username" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500 transition-all w-full p-4 text-xs rounded-xl outline-none" placeholder="NIK Anda" required>
            </div>

            <div style="margin-bottom: 1.75rem;">
                <label class="block text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Kata Sandi</label>
                <input type="password" id="password" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500 transition-all w-full p-4 text-xs rounded-xl outline-none" placeholder="Password" required>
                <label class="checkbox-container select-none dark:text-slate-400 mt-3 flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="showPass" onclick="togglePass('password')" class="accent-cyan-500">
                    <span class="text-[10px] font-bold tracking-wider uppercase text-slate-400">Tampilkan Sandi</span>
                </label>
            </div>
            
            <button type="submit" class="tj-btn w-full bg-gradient-to-r from-cyan-600 to-blue-700 dark:border-none shadow-lg shadow-cyan-900/30 text-white font-black py-4 rounded-xl text-[10px] tracking-widest uppercase transition-all active:scale-95">Masuk System</button>
        </form>
        
        <p id="message" style="text-align: center; color: #fbbf24; font-size: 0.65rem; font-weight: 700; margin-top: 1rem;"></p>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md z-[999] opacity-0 invisible transition-all duration-500">
        <div class="flex flex-col items-center justify-center">
            <div class="loader border-t-cyan-400 w-14 h-14 border-4 rounded-full slow-spin"></div> 
            <p class="text-cyan-400 font-black tracking-widest uppercase mt-4 text-[10px] animate-pulse">Memverifikasi Akun...</p>
        </div>
    </div>

    <div id="alertModal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm hidden items-center justify-center z-[1000] p-4 opacity-0 transition-opacity duration-300">
        <div id="alertModalContent" class="bg-white dark:bg-[#0a1224] rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border border-slate-200 dark:border-slate-800 transform scale-95 transition-all duration-300">
            <div class="w-16 h-16 bg-rose-50 dark:bg-rose-900/30 text-rose-500 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 border border-rose-100 dark:border-rose-800/50 shadow-inner">
                ⚠️
            </div>
            <h3 class="text-base font-black text-slate-800 dark:text-white uppercase tracking-tight mb-2">Autentikasi Gagal</h3>
            <p id="alertModalMessage" class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-6 leading-relaxed">Pesan kesalahan...</p>
            <button onclick="closeAlertModal()" class="w-full bg-slate-800 dark:bg-slate-100 dark:text-slate-900 hover:bg-slate-900 text-white py-3.5 rounded-xl text-xs font-black transition active:scale-95 uppercase tracking-wider">
                Mengerti
            </button>
        </div>
    </div>

    <script>
        // Cek Tema otomatis
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        function togglePass(id) {
            const x = document.getElementById(id);
            if (x) x.type = x.type === "password" ? "text" : "password";
        }

        // =======================================================
        // LOGIKA INTERSEPTOR / HIJACK NATIVE BROWSER ALERT RY
        // =======================================================
        window.alert = function(message) {
            const modal = document.getElementById('alertModal');
            const modalContent = document.getElementById('alertModalContent');
            const msgBody = document.getElementById('alertModalMessage');
            
            if (modal && msgBody && modalContent) {
                msgBody.innerText = message;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                // Triger animasi transisi smooth masuk
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 20);
            }
        };

        function closeAlertModal() {
            const modal = document.getElementById('alertModal');
            const modalContent = document.getElementById('alertModalContent');
            
            if (modal && modalContent) {
                modal.classList.add('opacity-0');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-95');
                
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                }, 300);
            }
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
