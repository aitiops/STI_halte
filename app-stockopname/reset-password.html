<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reset Sandi - IT Stock Opname</title>
    <link rel="stylesheet" href="css/styles.css">
    <script> tailwind.config = { darkMode: 'class' } </script>
</head>
<body class="tj-bg dark:bg-[#050b14] transition-colors duration-500 min-h-screen flex items-center justify-center selection:bg-cyan-500 selection:text-white">

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md z-[999] opacity-0 invisible transition-all duration-500">
        <div class="flex flex-col items-center justify-center">
            <div class="loader border-t-cyan-400 w-14 h-14 border-4 rounded-full slow-spin"></div> 
            <p id="loadingStatus" class="text-cyan-400 font-black tracking-widest uppercase mt-4 text-[10px] animate-pulse">Memperbarui Sandi...</p>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[9999] p-4 backdrop-blur-sm transition-all duration-300">
        <div class="bg-white dark:bg-[#0a1224] w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl border border-slate-200 dark:border-slate-800 text-center transform scale-95 transition-all duration-300">
            <div class="w-16 h-16 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-500 dark:text-emerald-400 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 animate-bounce">✓</div>
            <h3 class="text-slate-800 dark:text-white font-black text-sm uppercase tracking-wider mb-2">Sandi Diperbarui</h3>
            <p class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-6">Sandi Anda telah berhasil diubah. Silakan masuk kembali.</p>
            <button onclick="window.location.href='index.html'" class="w-full bg-slate-800 dark:bg-cyan-600 text-white py-3.5 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                Kembali ke Login
            </button>
        </div>
    </div>

    <div class="glass-card dark:bg-[#0a1224]/80 dark:border-slate-800 transition-all">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🔧</div>
            <h1 style="color: white; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em;">Update Sandi</h1>
        </div>

        <form onsubmit="event.preventDefault(); handleReset();" class="w-full">
            <div style="margin-bottom: 1rem;">
                <label class="label-text dark:text-cyan-400">Sandi Baru</label>
                <input type="password" id="newPassword" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500" placeholder="Min. 6 Karakter" required minlength="6">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label class="label-text dark:text-cyan-400">Ulangi Sandi</label>
                <input type="password" id="confirmPassword" class="tj-input dark:bg-[#111c3a] dark:border-slate-700 dark:text-white dark:focus:border-cyan-500" placeholder="Konfirmasi" required>
                <label class="checkbox-container dark:text-slate-400 mt-2 select-none">
                    <input type="checkbox" id="showReset" onclick="toggleReset()">
                    <span class="text-xs font-bold tracking-wide">Lihat Sandi</span>
                </label>
            </div>
            <button type="submit" id="btnReset" class="tj-btn dark:bg-gradient-to-r dark:from-cyan-600 dark:to-blue-700 shadow-lg shadow-cyan-900/30">Simpan</button>
        </form>
        <p id="msg" style="text-align: center; color: #fbbf24; font-size: 0.65rem; font-weight: 700; margin-top: 1rem;"></p>
    </div>

    <script>
        // Cek Tema
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        
        function toggleReset() {
            const p1 = document.getElementById("newPassword");
            const p2 = document.getElementById("confirmPassword");
            const type = p1.type === "password" ? "text" : "password";
            p1.type = type; p2.type = type;
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
